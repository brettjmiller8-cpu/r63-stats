<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rainbow Six 3 Stats Tracker</title>

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/fixedheader/3.4.0/css/fixedHeader.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/fixedcolumns/4.3.0/css/fixedColumns.dataTables.min.css">

<style>
  /* ===============================
     BASE STYLE (MATCHING OB_MA & INDEX)
     =============================== */
  body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    margin: 20px; 
    background-color: #f8f9fa; 
    color: #2c3e50; 
  }

  .header-box { 
    background: #2c3e50; 
    color: white; 
    padding: 20px; 
    border-radius: 8px; 
    margin-bottom: 20px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
  }

  .nav-buttons { margin-bottom: 20px; }
  
  button {
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid #dee2e6;
    background: white;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
    color: #2c3e50;
  }

  button:hover { background: #e9ecef; }

  #clearFilters { 
    background: #e74c3c; 
    color: white; 
    border: none; 
    margin-bottom: 15px;
  }
  
  #clearFilters:hover { background: #c0392b; }

  /* ===============================
     TABLE CONTAINER (CARD STYLE)
     =============================== */
  .stats-container {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    border-top: 5px solid #2c3e50;
  }

  /* ===============================
     DATATABLES OVERRIDES
     =============================== */
  table.dataTable { border-collapse: collapse !important; margin-top: 15px !important; }
  
  table.dataTable thead th {
    background: #f1f3f5 !important;
    color: #2c3e50;
    font-weight: bold;
    border: 1px solid #dee2e6 !important;
    text-align: center !important;
  }

  table.dataTable tbody td {
    border: 1px solid #dee2e6 !important;
    text-align: center !important;
    padding: 10px !important;
  }

  /* Custom sorting arrows to match cleaner look */
  #dataTable thead th.sorting::after,
  #dataTable thead th.sorting_asc::after,
  #dataTable thead th.sorting_desc::after {
    position: absolute;
    right: 8px;
    opacity: 0.5;
  }

  /* Zebra Striping */
  table.dataTable.display tbody tr.odd > .sorting_1, 
  table.dataTable.display tbody tr.odd { background-color: #ffffff !important; }
  table.dataTable.display tbody tr.even > .sorting_1, 
  table.dataTable.display tbody tr.even { background-color: #f8f9fa !important; }

  /* Hover effect */
  #dataTable tbody tr:hover td { background-color: #eef3ff !important; }

  .column-filter {
    width: 90%;
    padding: 4px;
    border-radius: 4px;
    border: 1px solid #ced4da;
    font-size: 12px;
  }

  .index-column { color: #7f8c8d; font-weight: bold; }
</style>
</head>

<body>

<div class="header-box">
  <h2 style="margin:0;">🎖️ R63: Black Arrow Stats</h2>
  <button id="clearFilters">🗑 Clear Filters</button>
</div>

<div class="nav-buttons">
  <a href="index.html"><button>Old Bow Stats</button></a>
  <a href="OB_MA.html"><button>Old Bow Match Analyzer</button></a>
  <a href="BA.html"><button style="background: #e9ecef;">Black Arrow Stats</button></a>
  <a href="BA_MA.html"><button>Black Arrow Match Analyzer</button></a>
    <a href="Tournament_Champs.html"><button>Tournament Champs</button></a>
    <a href="Match_submission.html"><button>Match Submission</button></a>
</div>

<div class="stats-container">
  <table id="dataTable" class="display" style="width:100%">
    <thead>
      <tr class="header-titles">
        <th class="index-column">#</th>
      </tr>
      <tr class="header-filters">
        <th></th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/fixedheader/3.4.0/js/dataTables.fixedHeader.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.datatables.net/fixedcolumns/4.3.0/js/dataTables.fixedColumns.min.js"></script>

<script>
fetch("R63 Data.xlsx")
  .then(res => res.arrayBuffer())
  .then(data => {
    const workbook = XLSX.read(data, { type: "array" });
    const sheetName = "BA"; // Ensuring we pull from the Black Arrow sheet
    const sheet = workbook.Sheets[sheetName];
    const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });

    const headers = json[0];
    const rows = json.slice(1);

    // Filter out rows that are completely empty or missing a Player name
    const normalizedRows = rows
      .filter(r => r.length > 0 && r[0] !== undefined && r[0] !== "") 
      .map(r => {
        const row = r.slice(0, headers.length);
        while (row.length < headers.length) row.push("");
        return row;
      });

    // Populate Headers
    headers.forEach(h => {
      document.querySelector(".header-titles").insertAdjacentHTML("beforeend", `<th>${h}</th>`);
      document.querySelector(".header-filters").insertAdjacentHTML("beforeend", "<th></th>");
    });

    const table = $('#dataTable').DataTable({
      data: normalizedRows,
      columns: [
        { 
          data: null, 
          defaultContent: "", 
          className: "index-column",
          orderable: false,
          searchable: false
        },
        ...headers.map((h, i) => {
          const cleanHeader = h.replace(/\s+/g, " ").trim().toLowerCase();
          
          if (cleanHeader === "avg. kills") {
            return {
              data: i,
              render: (data, type) => (type === "display" || type === "filter") ? (isNaN(data) ? "" : Math.round(data)) : data
            };
          }
          
          if (h.includes("%") || cleanHeader.includes("rate") || cleanHeader.includes("accuracy")) {
            return {
              data: i,
              render: (data, type) => {
                const num = Number(data);
                if (type === "display" || type === "filter") {
                  if (isNaN(num)) return "";
                  return num <= 1 ? Math.round(num * 100) + "%" : Math.round(num) + "%";
                }
                return num;
              }
            };
          }
          return { data: i, defaultContent: "" };
        })
      ],
      scrollX: true,
      scrollY: "65vh",
      scrollCollapse: true,
      paging: false,
      fixedHeader: true,
      fixedColumns: { left: 2 },
      columnDefs: [{ targets: 1, width: 160 }],
      initComplete: function () {
        const api = this.api();
        $("#clearFilters").on("click", function () {
          api.search("").columns().search("").draw();
          $(".column-filter").val("");
        });

        api.columns().every(function (colIdx) {
          if (colIdx === 0 || headers[colIdx - 1] !== "Player") return;
          const column = this;
          const cell = document.querySelectorAll(".header-filters th")[colIdx];
          const select = document.createElement("select");
          select.className = "column-filter";
          select.innerHTML = "<option value=''>All Players</option>";
          select.addEventListener("change", function () {
            const val = $.fn.dataTable.util.escapeRegex(this.value);
            column.search(val ? "^" + val + "$" : "", true, false).draw();
          });
          column.data().unique().sort().each(d => {
            if (d) select.insertAdjacentHTML("beforeend", `<option value="${d}">${d}</option>`);
          });
          cell.appendChild(select);
        });
      }
    });

    table.on('draw.dt', function () {
      table.column(0, { search: 'applied', order: 'applied' }).nodes().each((cell, i) => cell.innerHTML = i + 1);
    }).draw();

    $(window).on('resize', () => table.columns.adjust());
  });
</script>
</body>
</html>
