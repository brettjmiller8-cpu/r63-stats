<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rainbow Six 3 Stats Tracker</title>
<style>
  /* ===============================
     BASE STYLE (MATCHING PREVIOUS)
     =============================== */
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f8f9fa; color: #2c3e50; }
  
  .header-box { 
    background: #2c3e50; 
    color: white; 
    padding: 20px; 
    border-radius: 8px; 
    margin-bottom: 20px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
  }

  .nav-buttons { margin-bottom: 20px; }
  
  .nav-buttons button, .clear-btn-header {
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid #dee2e6;
    background: white;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
    color: #2c3e50;
  }

  .nav-buttons button:hover { background: #e9ecef; }

  .clear-btn-header {
    background: #e74c3c;
    color: white;
    border: none;
  }

  .clear-btn-header:hover {
    background: #c0392b;
    transform: translateY(-1px);
  }

  /* ===============================
     FORM STYLING
     =============================== */
  .form-container { 
    background: white; 
    padding: 30px; 
    border-radius: 12px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
    border-top: 5px solid #2c3e50; 
    max-width: 1100px; 
    margin: 0 auto; 
  }
  
  .section-title { border-bottom: 2px solid #eee; padding-bottom: 10px; margin: 25px 0 15px 0; color: #2c3e50; font-weight: bold; }
  
  .type-selector { display: flex; gap: 20px; background: #f1f3f5; padding: 15px; border-radius: 8px; margin-bottom: 20px; align-items: center; }
  .radio-group { display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 600; }

  .team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
  .team-card { padding: 15px; border-radius: 8px; border: 1px solid #dee2e6; }
  .green-team { border-top: 5px solid #27ae60; background: #fafffa; }
  .red-team { border-top: 5px solid #e74c3c; background: #fffafa; }

  .player-list-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .player-row { display: flex; gap: 5px; margin-bottom: 5px; }
  
  input, select { padding: 6px; border-radius: 4px; border: 1px solid #ced4da; font-size: 13px; }
  input[type="number"] { width: 55px; }
  input[type="text"] { flex-grow: 1; }

  .map-row { display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr; gap: 15px; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #eee; }
  
  .submit-btn { background: #2c3e50; color: white; border: none; padding: 15px 30px; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; margin-top: 20px; }
  .submit-btn:hover { background: #1a252f; transform: translateY(-2px); }

  label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: #7f8c8d; display: block; margin-bottom: 5px; }
</style>
</head>
<body>

<div class="header-box">
  <h2 style="margin:0;">📝 Submit Match Results</h2>
  <button type="button" class="clear-btn-header" onclick="clearMatchForm()">🗑 Clear Fields</button>
</div>

<div class="nav-buttons">
  <a href="index.html"><button>Old Bow Stats</button></a>
  <a href="OB_MA.html"><button>Old Bow Match Analyzer</button></a>
  <a href="BA.html"><button>Black Arrow Stats</button></a>
  <a href="BA_MA.html"><button>Black Arrow Match Analyzer</button></a>
  <a href="Tournament_Champs.html"><button>Tournament Champs</button></a>
  <a href="Match_submission.html"><button style="background: #e9ecef;">Submit Match</button></a>
</div>

<div class="form-container">
  <form id="matchSubmissionForm" action="https://formspree.io/f/mgoljlbj" method="POST">
    
    <div class="section-title">🎮 Match Type</div>
    <div class="type-selector">
        <label class="radio-group"><input type="radio" name="Match_Type" value="Old Bow" checked> Old Bow</label>
        <label class="radio-group"><input type="radio" name="Match_Type" value="Black Arrow"> Black Arrow</label>
    </div>

    <div class="section-title">👥 Team Rosters & Kills</div>
    <div class="team-grid">
      <div class="team-card green-team">
        <h4 style="color:#27ae60; margin: 0 0 10px 0;">Green Team</h4>
        <div class="player-list-grid" id="greenRoster">
            <div class="player-row"><input type="text" name="G_P1" placeholder="P1" required><input type="number" name="G_K1" placeholder="Kills"></div>
            <div class="player-row"><input type="text" name="G_P5" placeholder="P5"><input type="number" name="G_K5" placeholder="Kills"></div>
            <div class="player-row"><input type="text" name="G_P2" placeholder="P2"><input type="number" name="G_K2" placeholder="Kills"></div>
            <div class="player-row"><input type="text" name="G_P6" placeholder="P6"><input type="number" name="G_K6" placeholder="Kills"></div>
            <div class="player-row"><input type="text" name="G_P3" placeholder="P3"><input type="number" name="G_K3" placeholder="Kills"></div>
            <div class="player-row"><input type="text" name="G_P7" placeholder="P7"><input type="number" name="G_K7" placeholder="Kills"></div>
            <div class="player-row"><input type="text" name="G_P4" placeholder="P4"><input type="number" name="G_K4" placeholder= "Kills"></div>
            <div class="player-row"><input type="text" name="G_P8" placeholder="P8"><input type="number" name="G_K8" placeholder="Kills"></div>
        </div>
      </div>

      <div class="team-card red-team">
        <h4 style="color:#e74c3c; margin: 0 0 10px 0;">Red Team</h4>
        <div class="player-list-grid" id="redRoster">
            <div class="player-row"><input type="text" name="R_P1" placeholder="P1" required><input type="number" name="R_K1" placeholder="Kills"></div>
            <div class="player-row"><input type="text" name="R_P5" placeholder="P5"><input type="number" name="R_K5" placeholder="Kills"></div>
            <div class="player-row"><input type="text" name="R_P2" placeholder="P2"><input type="number" name="R_K2" placeholder="Kills"></div>
            <div class="player-row"><input type="text" name="R_P6" placeholder="P6"><input type="number" name="R_K6" placeholder="Kills"></div>
            <div class="player-row"><input type="text" name="R_P3" placeholder="P3"><input type="number" name="R_K3" placeholder="Kills"></div>
            <div class="player-row"><input type="text" name="R_P7" placeholder="P7"><input type="number" name="R_K7" placeholder="Kills"></div>
            <div class="player-row"><input type="text" name="R_P4" placeholder="P4"><input type="number" name="R_K4" placeholder= "Kills"></div>
            <div class="player-row"><input type="text" name="R_P8" placeholder="P8"><input type="number" name="R_K8" placeholder= "Kills"></div>
        </div>
      </div>
    </div>

    <div class="section-title">🗺 Map Results</div>
    <div class="map-row">
        <div><label>Map Name</label><input type="text" name="Map1_Name" placeholder="e.g. Presidio" required></div>
        <div><label>Map Winner</label><select name="Map1_Winner"><option value="Green">Green Team</option><option value="Red">Red Team</option></select></div>
        <div><label>Green Rds</label><input type="number" name="Map1_Score_Green" min="0" max="3" value="0"></div>
        <div><label>Red Rds</label><input type="number" name="Map1_Score_Red" min="0" max="3" value="0"></div>
    </div>
    <div class="map-row">
        <div><label>Map Name</label><input type="text" name="Map2_Name" placeholder="e.g. City Streets"></div>
        <div><label>Map Winner</label><select name="Map2_Winner"><option value="Green">Green Team</option><option value="Red">Red Team</option></select></div>
        <div><label>Green Rds</label><input type="number" name="Map2_Score_Green" min="0" max="3" value="0"></div>
        <div><label>Red Rds</label><input type="number" name="Map2_Score_Red" min="0" max="3" value="0"></div>
    </div>
        <div class="map-row">
        <div><label>Map Name</label><input type="text" name="Map3_Name" placeholder="e.g. Warehouse"></div>
        <div><label>Map Winner</label><select name="Map3_Winner"><option value="Green">Green Team</option><option value="Red">Red Team</option></select></div>
        <div><label>Green Rds</label><input type="number" name="Map3_Score_Green" min="0" max="3" value="0"></div>
        <div><label>Red Rds</label><input type="number" name="Map3_Score_Red" min="0" max="3" value="0"></div>
    </div>
        <div class="map-row">
        <div><label>Map Name</label><input type="text" name="Map4_Name" placeholder="e.g. Garage"></div>
        <div><label>Map Winner</label><select name="Map4_Winner"><option value="Green">Green Team</option><option value="Red">Red Team</option></select></div>
        <div><label>Green Rds</label><input type="number" name="Map4_Score_Green" min="0" max="3" value="0"></div>
        <div><label>Red Rds</label><input type="number" name="Map4_Score_Red" min="0" max="3" value="0"></div>
    </div>
        <div class="map-row">
        <div><label>Map Name</label><input type="text" name="Map5_Name" placeholder="e.g. Presidio"></div>
        <div><label>Map Winner</label><select name="Map5_Winner"><option value="Green">Green Team</option><option value="Red">Red Team</option></select></div>
        <div><label>Green Rds</label><input type="number" name="Map5_Score_Green" min="0" max="3" value="0"></div>
        <div><label>Red Rds</label><input type="number" name="Map5_Score_Red" min="0" max="3" value="0"></div>
    </div>

    <button type="submit" class="submit-btn">🚀 Submit Match Report</button>
  </form>
</div>

<script>
  function clearMatchForm() {
    if (confirm("Are you sure you want to clear all fields?")) {
      document.getElementById("matchSubmissionForm").reset();
    }
  }
</script>

</body>
</html>
