  <script>
    async function fetchEventsFromExcel() {
        try {
            const res = await fetch('R63 Data.xlsx');
            if (!res.ok) throw new Error("File not found");
            
            const ab = await res.arrayBuffer();
            const wb = XLSX.read(ab, {type: 'array', cellDates: true});
            const sheet = wb.Sheets['Events']; 
            if (!sheet) return [];

            const rawData = XLSX.utils.sheet_to_json(sheet);

            return rawData.map(row => {
                let finalStart = row.Start;

                if (row.Start instanceof Date) {
                    const y = row.Start.getUTCFullYear();
                    const m = String(row.Start.getUTCMonth() + 1).padStart(2, '0');
                    const d = String(row.Start.getUTCDate()).padStart(2, '0');
                    finalStart = `${y}-${m}-${d}`;
                }
                
                if (row.Time) {
                    let cleanTime = row.Time.replace(/EST|EDT/gi, '').trim();
                    const [time, modifier] = cleanTime.split(' ');
                    let [hours, minutes] = time.split(':');
                    
                    if (hours === '12') hours = '00';
                    if (modifier && modifier.toUpperCase() === 'PM') {
                        hours = parseInt(hours, 10) + 12;
                    }
                    if (!minutes) minutes = '00';
                    
                    finalStart = `${finalStart}T${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:00`;
                }

                // Explicitly mapping the background color here
                return {
                    title: row.Title || "Match",
                    start: finalStart,
                    backgroundColor: row.Color || '#9b59b6', 
                    borderColor: row.Color || '#9b59b6',
                    display: 'block', // FORCE it to be a block, not a list item with a dot
                    allDay: !row.Time,
                    extendedProps: {
                        description: row.Description || ""
                    }
                };
            });
        } catch (error) {
            console.error(error);
            return [];
        }
    }

    document.addEventListener('DOMContentLoaded', async function() {
        const calendarEl = document.getElementById('calendar');
        const eventData = await fetchEventsFromExcel();
        
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            height: 'auto',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,listWeek'
            },
            eventTimeFormat: { 
                hour: 'numeric',
                minute: '2-digit',
                meridiem: 'short'
            },
            events: eventData,
            eventClick: function(info) {
                alert(info.event.title + "\n\n" + (info.event.extendedProps.description || ""));
            }
        });
        
        calendar.render();
    });
  </script>
