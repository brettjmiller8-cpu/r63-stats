<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rainbow Six 3 Match Stats</title>

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/fixedheader/3.4.0/css/fixedHeader.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/fixedcolumns/4.3.0/css/fixedColumns.dataTables.min.css">

<style>
/* ===============================
   BASE TABLE
   =============================== */
body {
  font-family: Arial, sans-serif;
  margin: 20px;
}

table.dataTable {
  width: 100% !important;
}

/* ===============================
   HEADER + SORTING
   ============================== */

#dataTable thead th.sorting,
#dataTable thead th.sorting_asc,
#dataTable thead th.sorting_desc {
  background-image: none !important;
  padding-right: 26px !important;
  position: relative;
}

#dataTable thead th.sorting::after {
  content: "⇅";
  font-size: 11px;
  opacity: 0.4;
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
}

#dataTable thead th.sorting_asc::after {
  content: "▲";
  font-size: 10px;
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
}

#dataTable thead th.sorting_desc::after {
  content: "▼";
  font-size: 10px;
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
}

/* Header highlight */
#dataTable thead th.sorting_asc,
#dataTable thead th.sorting_desc {
  background-color: #eef3ff;
  font-weight: bold;
}

/* Cell highlight */
#dataTable tbody td.sorted {
  background-color: #f4f7ff;
}

/* ===============================
   FILTER ROW
   =============================== */
.column-filter {
  width: 100%;
  font-size: 12px;
}

/* Prevent sorting from filter row */
#dataTable thead tr.header-filters th {
  pointer-events: none;
}

/* ===============================
   COLUMN WIDTH + NO WRAP
   =============================== */
#dataTable th,
#dataTable td {
  min-width: 100px;
  white-space: nowrap;
}

/* Center all table data */
#dataTable thead th,
#dataTable tbody td {
  text-align: center;
  vertical-align: middle;
}

/* Zebra striping — FORCE all columns including FixedColumns */
#dataTable tbody tr:nth-child(odd) td,
.dtfc-fixed-left tbody tr:nth-child(odd) td {
  background-color: #ffffff !important;
}

#dataTable tbody tr:nth-child(even) td,
.dtfc-fixed-left tbody tr:nth-child(even) td {
  background-color: #f2f2f2 !important;
}

/* Hover */
#dataTable tbody tr:hover td,
.dtfc-fixed-left tbody tr:hover td {
  background-color: #e9f1ff !important;
}

/* The index column style */
.index-column {
  font-weight: normal !important;
  color: #666;
  width: 40px !important;
  min-width: 40px !important;
}
</style>
</head>

<body>
<h2>Rainbow Six 3: Old Bow Stats</h2>
<div style="margin-bottom: 10px;">
  <a href="index.html"><button>Old Bow Stats</button></a>
  <a href="OB_MA.html"><button>Old Bow Match Analyzer</button></a>
  <a href="BA.html"><button>Black Arrow Stats</button></a>
  <a href="BA_MA.html"><button>Black Arrow Match Analyzer</button></a>
</div>

<div style="margin-bottom: 10px;">
  <button id="clearFilters">Clear Filters</button>
</div>

<table id="dataTable" class="display" style="width:100%">
  <thead>
    <tr class="header-titles">
      <th class="index-column">#</th>
    </tr>
    <tr class="header-filters">
      <th></th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/fixedheader/3.4.0/js/dataTables.fixedHeader.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.datatables.net/fixedcolumns/4.3.0/js/dataTables.fixedColumns.min.js"></script>

<script>
fetch("R63 Data.xlsx")
  .then(res => res.arrayBuffer())
  .then(data => {
    const workbook = XLSX.read(data, { type: "array" });
    const sheetName = "Old Bow";
    const sheet = workbook.Sheets[sheetName];
    const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });

    const headers = json[0];
    const rows = json.slice(1);

    const normalizedRows = rows.map(r => {
      const row = r.slice(0, headers.length);
      while (row.length < headers.length) {
        row.push("");
      }
      return row;
    });

    // Populate Headers
    headers.forEach(h => {
      document.querySelector(".header-titles").insertAdjacentHTML("beforeend", `<th>${h}</th>`);
      document.querySelector(".header-filters").insertAdjacentHTML("beforeend", "<th></th>");
    });

    const table = $('#dataTable').DataTable({
      data: normalizedRows,
      columns: [
        { 
          data: null, 
          defaultContent: "", 
          className: "index-column",
          orderable: false,
          searchable: false
        },
        ...headers.map((h, i) => {
          const cleanHeader = h.replace(/\s+/g, " ").trim().toLowerCase();

          if (cleanHeader === "avg. kills") {
            return {
              data: i,
              render: function (data, type) {
                const num = Number(data);
                if (type === "display" || type === "filter") {
                  return isNaN(num) ? "" : Math.round(num);
                }
                return num;
              }
            };
          }

          if (h.includes("%") || cleanHeader.includes("rate") || cleanHeader.includes("accuracy")) {
            return {
              data: i,
              render: function (data, type) {
                const num = Number(data);
                if (type === "display" || type === "filter") {
                  if (isNaN(num)) return "";
                  return num <= 1 ? Math.round(num * 100) + "%" : Math.round(num) + "%";
                }
                return num;
              }
            };
          }

          return { data: i, defaultContent: "" };
        })
      ],
      scrollX: true,
      scrollY: "70vh",
      scrollCollapse: true,
      paging: false,
      autoWidth: false,
      orderCellsTop: true,
      fixedHeader: true,
      fixedColumns: {
        left: 2 // Freeze # and Player
      },
      columnDefs: [
        { targets: 1, width: 160 } // Player column is now index 1
      ],
      initComplete: function () {
        const api = this.api();

        $("#clearFilters").on("click", function () {
          api.search("").columns().search("").draw();
          $(".column-filter").val("");
        });

        api.columns().every(function (colIdx) {
          // Adjust index: headers array doesn't have the '#' column, so colIdx 1 is headers[0]
          if (colIdx === 0 || headers[colIdx - 1] !== "Player") return;

          const column = this;
          const cell = document.querySelectorAll(".header-filters th")[colIdx];

          const select = document.createElement("select");
          select.className = "column-filter";
          select.innerHTML = "<option value=''>All Players</option>";

          select.addEventListener("change", function () {
            const val = $.fn.dataTable.util.escapeRegex(this.value);
            column.search(val ? "^" + val + "$" : "", true, false).draw();
          });

          column.data().unique().sort().each(d => {
            if (d) select.insertAdjacentHTML("beforeend", `<option value="${d}">${d}</option>`);
          });

          cell.appendChild(select);
        });
      }
    });

    // Dynamic numbering logic
    table.on('draw.dt', function () {
      table.column(0, { search: 'applied', order: 'applied' }).nodes().each(function (cell, i) {
        cell.innerHTML = i + 1;
      });
    }).draw();

    // Fix column alignment on window resize
    $(window).on('resize', function () {
        table.columns.adjust();
    });
  });
</script>
</body>
</html>
