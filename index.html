<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rainbow Six 3 Match Stats</title>

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/fixedheader/3.4.0/css/fixedHeader.dataTables.min.css">

<style>
body { font-family: Arial, sans-serif; margin: 20px; }
table.dataTable {
  width: 100% !important;
}
/* ===============================
   INLINE SORT ICONS — FIXEDHEADER
   =============================== */

/* Disable DataTables default background arrows */
#dataTable thead tr.header-titles th.sorting,
#dataTable thead tr.header-titles th.sorting_asc,
#dataTable thead tr.header-titles th.sorting_desc,
table.fixedHeader-floating thead tr.header-titles th.sorting,
table.fixedHeader-floating thead tr.header-titles th.sorting_asc,
table.fixedHeader-floating thead tr.header-titles th.sorting_desc {
  background-image: none !important;
}

/* Custom inline arrows */
#dataTable thead tr.header-titles th.sorting::after,
table.fixedHeader-floating thead tr.header-titles th.sorting::after {
  content: "⇅";
  font-size: 11px;
  opacity: 0.4;
}

#dataTable thead tr.header-titles th.sorting_asc::after,
table.fixedHeader-floating thead tr.header-titles th.sorting_asc::after {
  content: "▲";
  font-size: 10px;
}

#dataTable thead tr.header-titles th.sorting_desc::after,
table.fixedHeader-floating thead tr.header-titles th.sorting_desc::after {
  content: "▼";
  font-size: 10px;
}
.column-filter {
  width: 100%;
  font-size: 12px;
}

#dataTable th,
#dataTable td {
  min-width: 140px;
  white-space: nowrap;
}
/* FORCE DataTables sort icons to align with header text */
#dataTable thead th.sorting,
#dataTable thead th.sorting_asc,
#dataTable thead th.sorting_desc,
table.fixedHeader-floating thead th.sorting,
table.fixedHeader-floating thead th.sorting_asc,
table.fixedHeader-floating thead th.sorting_desc {
  background-position: right center !important;
  padding-right: 22px !important;
}

/* Reduce header row height so arrows don't drift downward */
#dataTable thead th {
  line-height: 1.2;
  vertical-align: middle;
}

</style>
</head>

<body>
<h2>Rainbow Six 3 Old Bow Stats</h2>
<div style="margin-bottom: 10px;">
 <a href="index.html"><button>Old Bow Stats</button></a>
  <a href="BA.html"><button>Black Arrow Stats</button></a>
</div>
<div style="margin-bottom: 10px;">
  <button id="clearFilters">Clear Filters</button>
</div>

<table id="dataTable" class="display" style="width:100%">
  <thead>
    <tr class="header-titles"></tr>
    <tr class="header-filters"></tr>
  </thead>
  <tbody></tbody>
</table>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/fixedheader/3.4.0/js/dataTables.fixedHeader.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script>
fetch("R63 Data.xlsx")
  .then(res => res.arrayBuffer())
  .then(data => {
    const workbook = XLSX.read(data, { type: "array" });
    const sheetName = workbook.SheetNames[0];
    const sheet = workbook.Sheets[sheetName];
    const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });

    const headers = json[0];
    const rows = json.slice(1);

    headers.forEach(h => {
      document.querySelector(".header-titles").insertAdjacentHTML("beforeend", `<th>${h}</th>`);
      document.querySelector(".header-filters").insertAdjacentHTML("beforeend", "<th></th>");
    });

    $('#dataTable').DataTable({
      data: rows,
columns: headers.map(h => {

  const cleanHeader = h.replace(/\s+/g, " ").trim();

  // Avg. Kills → integer
  if (cleanHeader.toLowerCase() === "avg. kills") {
    return {
      render: function (data, type) {
        const num = Number(data);
        if (type === "display" || type === "filter") {
          return isNaN(num) ? "" : Math.round(num);
        }
        return num;
      }
    };
  }

  // 🔥 AUTO-DETECT percentage columns
  if (
    cleanHeader.includes("%") ||
    cleanHeader.toLowerCase().includes("rate") ||
    cleanHeader.toLowerCase().includes("accuracy")
  ) {
    return {
      render: function (data, type) {
        const num = Number(data);

        if (type === "display" || type === "filter") {
          if (isNaN(num)) return "";

          // If value is 0–1, treat as decimal percent
          if (num <= 1) {
            return Math.round(num * 100) + "%";
          }

          // Otherwise treat as already percent
          return Math.round(num) + "%";
        }

        return num; // numeric sorting
      }
    };
  }

  // Default column
  return null;
}),
      scrollY: "70vh",
      scrollCollapse: true,
      paging: false,
     fixedHeader: {
  header: true,
  footer: false
},
scrollX: true,
orderCellsTop: true,
autoWidth: false,
      initComplete: function () {
        const api = this.api();

        // Clear all filters button
$("#clearFilters").on("click", function () {
  api.search("").columns().search("").draw();

  // Reset Player dropdown UI
  $(".column-filter").val("");
});

        api.columns().every(function (colIdx) {
          if (headers[colIdx] !== "Player") return;

          const column = this;
          const cell = document.querySelectorAll(".header-filters th")[colIdx];

          const select = document.createElement("select");
          select.className = "column-filter";
          select.innerHTML = "<option value=''>All</option>";

          select.addEventListener("change", function () {
            const val = $.fn.dataTable.util.escapeRegex(this.value);
            column.search(val ? "^" + val + "$" : "", true, false).draw();
          });

          column.data().unique().sort().each(d => {
            if (d) select.insertAdjacentHTML("beforeend", `<option value="${d}">${d}</option>`);
          });

          cell.appendChild(select);
          const api = this.api();

setTimeout(() => {
  api.columns.adjust();
}, 0);
        });
      }
    });
  });
</script>
</body>
</html>
